name: Prepare Maia3 wheelhouse review

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/maia-wheelhouse-review.yml
      - packaging/maia3/build_wheel_lock.py
      - packaging/maia3/requirements-direct.txt

permissions:
  contents: read

concurrency:
  group: maia3-wheelhouse-review
  cancel-in-progress: false

jobs:
  inventory:
    name: Candidate wheel inventory · ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            pip_platform_args: --platform win_amd64 --python-version 3.12 --implementation cp --abi cp312
          - os: macos-15
            platform: macos-aarch64
            pip_platform_args: --platform macosx_12_0_arm64 --python-version 3.12 --implementation cp --abi cp312
          - os: ubuntu-24.04
            platform: linux-x86_64
            pip_platform_args: --platform manylinux_2_28_x86_64 --platform manylinux2014_x86_64 --platform manylinux_2_17_x86_64 --python-version 3.12 --implementation cp --abi cp312
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            pip_platform_args: --platform manylinux_2_28_aarch64 --platform manylinux2014_aarch64 --platform manylinux_2_17_aarch64 --python-version 3.12 --implementation cp --abi cp312
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.10
          cache: pip
          cache-dependency-path: packaging/maia3/requirements-direct.txt
      - name: Download without installing and create canonical inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir wheelhouse
          read -r -a target_args <<< '${{ matrix.pip_platform_args }}'
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            --index-url https://download.pytorch.org/whl/cpu \
            --extra-index-url https://pypi.org/simple \
            "${target_args[@]}" \
            --requirement packaging/maia3/requirements-direct.txt
          python packaging/maia3/build_wheel_lock.py \
            --wheelhouse wheelhouse \
            --platform '${{ matrix.platform }}' \
            --requirements "$RUNNER_TEMP/maia3-wheels.txt" \
            --inventory "$RUNNER_TEMP/WHEELHOUSE.lock.json"
          INVENTORY="$RUNNER_TEMP/WHEELHOUSE.lock.json" python -c \
            'import hashlib, os, pathlib; p=pathlib.Path(os.environ["INVENTORY"]); print(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}")' \
            | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload data-only candidate inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maia3-wheelhouse-review-${{ matrix.platform }}
          path: ${{ runner.temp }}/WHEELHOUSE.lock.json
          if-no-files-found: error
          overwrite: true

  publish_candidate:
    name: Publish review candidate branch
    needs: inventory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download all candidate inventories
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: maia3-wheelhouse-review-*
          path: candidates
      - name: Commit immutable candidates to a public review branch
        shell: bash
        run: |
          set -euo pipefail
          target=packaging/maia3/wheelhouse-review-candidate
          mkdir -p "$target"
          for platform in windows-x86_64 macos-aarch64 linux-x86_64 linux-aarch64; do
            source="candidates/maia3-wheelhouse-review-$platform/WHEELHOUSE.lock.json"
            test -s "$source"
            cp "$source" "$target/$platform.json"
          done
          branch="maia3-wheelhouse-review-${GITHUB_SHA:0:12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name github-actions
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "$target"
          if ! git diff --cached --quiet; then
            git commit -m "Publish Maia3 wheelhouse review candidates for ${GITHUB_SHA:0:12}"
          fi
          git push origin "HEAD:refs/heads/$branch"
          {
            echo 'Review candidate branch:'
            echo
            echo "\`$branch\`"
          } >> "$GITHUB_STEP_SUMMARY"
