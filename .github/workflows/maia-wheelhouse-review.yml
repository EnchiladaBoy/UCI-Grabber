name: Prepare Maia3 wheelhouse review

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/maia-wheelhouse-review.yml
      - packaging/maia3/build_wheel_lock.py
      - packaging/maia3/requirements-direct.txt

permissions:
  contents: read

concurrency:
  group: maia3-wheelhouse-review
  cancel-in-progress: false

jobs:
  catalog_key:
    name: Verify catalog signing key availability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Match the protected key to the embedded public key
        shell: bash
        env:
          PRIVATE_KEY_BASE64: ${{ secrets.CATALOG_ED25519_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "${PRIVATE_KEY_BASE64:-}" || {
            echo 'CATALOG_ED25519_PRIVATE_KEY_BASE64 is not configured.' >&2
            exit 1
          }
          private_key="$RUNNER_TEMP/catalog-private.pem"
          derived_public="$RUNNER_TEMP/catalog-public.pem"
          python -c 'import base64, os, pathlib; pathlib.Path(os.environ["RUNNER_TEMP"], "catalog-private.pem").write_bytes(base64.b64decode(os.environ["PRIVATE_KEY_BASE64"], validate=True))'
          chmod 600 "$private_key"
          openssl pkey -in "$private_key" -pubout -out "$derived_public"
          actual="$(openssl pkey -pubin -in "$derived_public" -outform DER | tail -c 32 | od -An -vtx1 | tr -d ' \n')"
          expected="$(tr -d ' \r\n' < catalog/catalog.pub)"
          test "$actual" = "$expected" || {
            echo 'The protected catalog key does not match catalog.pub.' >&2
            exit 1
          }
          rm -f "$private_key"

  inventory:
    name: Candidate wheel inventory · ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-15
            platform: macos-aarch64
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.10
          cache: pip
          cache-dependency-path: packaging/maia3/requirements-direct.txt
      - name: Download without installing and create canonical inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir wheelhouse
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            --index-url https://download.pytorch.org/whl/cpu \
            --extra-index-url https://pypi.org/simple \
            --requirement packaging/maia3/requirements-direct.txt
          python packaging/maia3/build_wheel_lock.py \
            --wheelhouse wheelhouse \
            --platform '${{ matrix.platform }}' \
            --requirements "$RUNNER_TEMP/maia3-wheels.txt" \
            --inventory "$RUNNER_TEMP/WHEELHOUSE.lock.json"
          INVENTORY="$RUNNER_TEMP/WHEELHOUSE.lock.json" python -c \
            'import hashlib, os, pathlib; p=pathlib.Path(os.environ["INVENTORY"]); print(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}")' \
            | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload data-only candidate inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maia3-wheelhouse-review-${{ matrix.platform }}
          path: ${{ runner.temp }}/WHEELHOUSE.lock.json
          if-no-files-found: error
          overwrite: true

  publish_candidate:
    name: Publish review candidate branch
    needs: inventory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download all candidate inventories
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: maia3-wheelhouse-review-*
          path: candidates
      - name: Commit immutable candidates to a public review branch
        shell: bash
        run: |
          set -euo pipefail
          target=packaging/maia3/wheelhouse-review-candidate
          mkdir -p "$target"
          for platform in windows-x86_64 macos-aarch64 linux-x86_64 linux-aarch64; do
            source="candidates/maia3-wheelhouse-review-$platform/WHEELHOUSE.lock.json"
            test -s "$source"
            cp "$source" "$target/$platform.json"
          done
          branch="maia3-wheelhouse-review-${GITHUB_SHA:0:12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name github-actions
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "$target"
          git commit -m "Publish Maia3 wheelhouse review candidates for ${GITHUB_SHA:0:12}"
          git push origin "HEAD:refs/heads/$branch"
          {
            echo 'Review candidate branch:'
            echo
            echo "\`$branch\`"
          } >> "$GITHUB_STEP_SUMMARY"
