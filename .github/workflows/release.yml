name: Release catalog and optional Maia3 component

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable vMAJOR.MINOR.PATCH tag to package
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: uci-grabber-release
  cancel-in-progress: false

jobs:
  gate:
    name: Validate tag and optional-component review gate
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      maia_enabled: ${{ steps.metadata.outputs.maia_enabled }}
      metadata_digest: ${{ steps.metadata.outputs.metadata_digest }}
      source_review_digest: ${{ steps.metadata.outputs.source_review_digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: metadata
        name: Resolve immutable release inputs
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
          MODEL_LICENSE_REVIEW: ${{ vars.MAIA3_MODEL_LICENSE_REVIEW }}
          CORRESPONDING_SOURCE_REVIEW: ${{ vars.MAIA3_CORRESPONDING_SOURCE_REVIEW }}
          WHEELHOUSE_WINDOWS_REVIEW: ${{ vars.MAIA3_WHEELHOUSE_REVIEW_WINDOWS_X86_64 }}
          WHEELHOUSE_MACOS_REVIEW: ${{ vars.MAIA3_WHEELHOUSE_REVIEW_MACOS_AARCH64 }}
          WHEELHOUSE_LINUX_X86_REVIEW: ${{ vars.MAIA3_WHEELHOUSE_REVIEW_LINUX_X86_64 }}
          WHEELHOUSE_LINUX_ARM_REVIEW: ${{ vars.MAIA3_WHEELHOUSE_REVIEW_LINUX_AARCH64 }}
        run: |
          set -euo pipefail
          [[ "$REQUESTED_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo 'Release tag must use vMAJOR.MINOR.PATCH.' >&2
            exit 1
          }
          version="${REQUESTED_TAG#v}"
          manifest_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          test "$version" = "$manifest_version" || {
            echo "Tag $REQUESTED_TAG does not match Cargo version $manifest_version." >&2
            exit 1
          }
          digest="$(sha256sum packaging/maia3/component-metadata.json | awk '{print $1}')"
          wheelhouse_arguments=(
            --wheelhouse "windows-x86_64=${WHEELHOUSE_WINDOWS_REVIEW:-}"
            --wheelhouse "macos-aarch64=${WHEELHOUSE_MACOS_REVIEW:-}"
            --wheelhouse "linux-x86_64=${WHEELHOUSE_LINUX_X86_REVIEW:-}"
            --wheelhouse "linux-aarch64=${WHEELHOUSE_LINUX_ARM_REVIEW:-}"
          )
          if test -n "${MODEL_LICENSE_REVIEW:-}" && test "$MODEL_LICENSE_REVIEW" = "$digest"; then
            source_digest="$(python3 packaging/maia3/review_digest.py \
              source-release "${wheelhouse_arguments[@]}")"
            python3 packaging/maia3/review_digest.py verify-source \
              --expected "${CORRESPONDING_SOURCE_REVIEW:-}" \
              "${wheelhouse_arguments[@]}"
            enabled=true
          else
            enabled=false
            source_digest="$(python3 packaging/maia3/review_digest.py source)"
            echo 'Maia3 remains excluded: checkpoint terms review digest is absent or stale.'
          fi
          {
            echo "tag=$REQUESTED_TAG"
            echo "maia_enabled=$enabled"
            echo "metadata_digest=$digest"
            echo "source_review_digest=$source_digest"
          } >> "$GITHUB_OUTPUT"
      - name: Validate release-side source
        run: |
          python3 packaging/maia3/validate_metadata.py
          python3 -m unittest discover -s packaging/maia3/tests -v
          python3 -m unittest discover -s catalog/tests -v
          python3 catalog/verify_catalog.py \
            --catalog catalog/catalog.json \
            --signature catalog/catalog.sig \
            --bootstrap

  licenses:
    name: Rust dependency license gate
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.tag }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.92.0"
      - name: Install pinned cargo-about
        run: cargo install --locked --version 0.9.1 --features cli cargo-about
      - name: Generate reviewed dependency notices
        run: |
          cp packaging/licenses/about.toml about.toml
          cargo about generate \
            --locked \
            --workspace \
            --all-features \
            --fail \
            --output-file THIRD-PARTY-LICENSES.txt \
            packaging/licenses/about.hbs
          test -s THIRD-PARTY-LICENSES.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: application-third-party-licenses
          path: THIRD-PARTY-LICENSES.txt
          if-no-files-found: error
          overwrite: true

  app_build:
    name: UCI Grabber application · ${{ matrix.platform }}
    needs: [gate, licenses]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            binary: uci-grabber.exe
            asset: uci-grabber-windows-x86_64.zip
          - os: macos-15
            platform: macos-aarch64
            binary: uci-grabber
            asset: UCI-Grabber-macos-aarch64.app.zip
          - os: ubuntu-24.04
            platform: linux-x86_64
            binary: uci-grabber
            asset: uci-grabber-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            binary: uci-grabber
            asset: uci-grabber-linux-aarch64.tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.tag }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.92.0"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            pkg-config
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: application-third-party-licenses
          path: release-inputs
      - name: Build and smoke the native application
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-aarch64' && '12.3' || '' }}
        run: |
          set -euo pipefail
          cargo build --release --locked
          'target/release/${{ matrix.binary }}' --help
      - name: Create deterministic application archive
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.gate.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir release-assets
          python packaging/app/package_app.py \
            --platform '${{ matrix.platform }}' \
            --version "${RELEASE_TAG#v}" \
            --binary 'target/release/${{ matrix.binary }}' \
            --license LICENSE \
            --readme README.md \
            --third-party release-inputs/THIRD-PARTY-LICENSES.txt \
            --output 'release-assets/${{ matrix.asset }}'
          test -s 'release-assets/${{ matrix.asset }}'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-app-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          overwrite: true

  maia_source:
    name: Maia3 reviewed source/build materials
    needs: gate
    if: needs.gate.outputs.maia_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.tag }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.12.10
      - name: Fetch exact Maia3 and dependency source
        shell: bash
        env:
          MAIA_COMMIT: 1e13597c42d4858b7cfd7cfdae01e297263364b2
        run: |
          set -euo pipefail
          upstream="$RUNNER_TEMP/maia3-upstream"
          git init "$upstream"
          git -C "$upstream" remote add origin https://github.com/CSSLab/maia3.git
          git -C "$upstream" fetch --depth=1 origin "$MAIA_COMMIT"
          git -C "$upstream" checkout --detach FETCH_HEAD
          test "$(git -C "$upstream" rev-parse HEAD)" = "$MAIA_COMMIT"
          test -s "$upstream/LICENSE"
          test -s "$upstream/maia3/uci.py"
          mkdir dependency-source release-assets
          python -m pip download \
            --dest dependency-source \
            --no-deps \
            --no-binary=:all: \
            'chess==1.11.2'
          mapfile -t sources < <(find dependency-source -maxdepth 1 -type f)
          test "${#sources[@]}" = 1
          python packaging/maia3/verify_file.py "${sources[0]}" \
            --bytes 6131385 \
            --sha256 a8b43e5678fdb3000695bdaa573117ad683761e5ca38e591c4826eba6d25bb39
          python packaging/maia3/make_source_bundle.py \
            --upstream "$upstream" \
            --output release-assets/maia3-corresponding-source.tar.gz \
            --notices release-assets/MAIA3-NOTICES.txt \
            --dependency-source "${sources[0]}" \
            --source-review-digest '${{ needs.gate.outputs.source_review_digest }}'
          tar -tzf release-assets/maia3-corresponding-source.tar.gz \
            | grep -Fx 'maia3-source/upstream/LICENSE'
          tar -tzf release-assets/maia3-corresponding-source.tar.gz \
            | grep -Fx 'maia3-source/uci-grabber-packaging/maia3.spec'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: component-maia3-source
          path: release-assets/*
          if-no-files-found: error
          overwrite: true

  maia_runtime:
    name: Maia3 runtime · ${{ matrix.platform }}
    needs: [gate, maia_source]
    if: needs.gate.outputs.maia_enabled == 'true'
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
            archive: zip
            asset: uci-grabber-maia3-runtime-windows-x86_64.zip
            wheelhouse_review_variable: MAIA3_WHEELHOUSE_REVIEW_WINDOWS_X86_64
          - os: macos-15
            platform: macos-aarch64
            archive: tar.zst
            asset: uci-grabber-maia3-runtime-macos-aarch64.tar.zst
            wheelhouse_review_variable: MAIA3_WHEELHOUSE_REVIEW_MACOS_AARCH64
          - os: ubuntu-24.04
            platform: linux-x86_64
            archive: tar.zst
            asset: uci-grabber-maia3-runtime-linux-x86_64.tar.zst
            wheelhouse_review_variable: MAIA3_WHEELHOUSE_REVIEW_LINUX_X86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            archive: tar.zst
            asset: uci-grabber-maia3-runtime-linux-aarch64.tar.zst
            wheelhouse_review_variable: MAIA3_WHEELHOUSE_REVIEW_LINUX_AARCH64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.tag }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.12.10
          cache: pip
          cache-dependency-path: packaging/maia3/requirements-direct.txt
      - name: Install deterministic archive tooling on Linux
        if: runner.os == 'Linux'
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y zstd
      - name: Install deterministic archive tooling on macOS
        if: runner.os == 'macOS'
        run: brew install zstd
      - name: Fetch exact source and resolve the candidate native wheelhouse
        shell: bash
        env:
          MAIA_COMMIT: 1e13597c42d4858b7cfd7cfdae01e297263364b2
        run: |
          set -euo pipefail
          upstream="$RUNNER_TEMP/maia3-upstream"
          git init "$upstream"
          git -C "$upstream" remote add origin https://github.com/CSSLab/maia3.git
          git -C "$upstream" fetch --depth=1 origin "$MAIA_COMMIT"
          git -C "$upstream" checkout --detach FETCH_HEAD
          test "$(git -C "$upstream" rev-parse HEAD)" = "$MAIA_COMMIT"
          mkdir wheelhouse
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            --index-url https://pypi.org/simple \
            --requirement packaging/maia3/requirements-direct.txt
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            --index-url https://download.pytorch.org/whl/cpu \
            --extra-index-url https://pypi.org/simple \
            'torch==2.11.0'
          python packaging/maia3/build_wheel_lock.py \
            --wheelhouse wheelhouse \
            --platform '${{ matrix.platform }}' \
            --requirements "$RUNNER_TEMP/maia3-wheels.txt" \
            --inventory "$RUNNER_TEMP/WHEELHOUSE.lock.json"
      - name: Upload candidate wheel inventory for maintainer review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maia3-wheelhouse-review-${{ matrix.platform }}
          path: ${{ runner.temp }}/WHEELHOUSE.lock.json
          if-no-files-found: error
          overwrite: true
      - name: Require the reviewed wheelhouse before installation
        shell: bash
        env:
          REVIEWED_WHEELHOUSE_SHA256: ${{ vars[matrix.wheelhouse_review_variable] }}
        run: |
          set -euo pipefail
          python packaging/maia3/review_digest.py verify \
            "$RUNNER_TEMP/WHEELHOUSE.lock.json" \
            --expected "${REVIEWED_WHEELHOUSE_SHA256:-}" \
            --label '${{ matrix.platform }} wheelhouse'
      - name: Install only the reviewed local wheelhouse and pinned Maia3 source
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install \
            --no-index \
            --find-links wheelhouse \
            --require-hashes \
            --requirement "$RUNNER_TEMP/maia3-wheels.txt"
          python -m pip install \
            --no-deps \
            --no-build-isolation \
            "$RUNNER_TEMP/maia3-upstream"
          python -c "import torch; assert torch.__version__.split('+')[0] == '2.11.0'; assert torch.version.cuda is None"
      - name: Build the model-free runtime
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-aarch64' && '12.3' || '' }}
        run: |
          set -euo pipefail
          python packaging/maia3/build_runtime.py \
            --platform '${{ matrix.platform }}' \
            --upstream "$RUNNER_TEMP/maia3-upstream" \
            --wheel-inventory "$RUNNER_TEMP/WHEELHOUSE.lock.json" \
            --work "$RUNNER_TEMP/maia3-build" \
            --stage "$RUNNER_TEMP/maia3-stage"
          test -s "$RUNNER_TEMP/maia3-stage/maia3-runtime/BUILDINFO.json"
          test -s "$RUNNER_TEMP/maia3-stage/maia3-runtime/COPYING-Maia3-AGPL-3.0.txt"

      - name: Authenticode-sign every Windows PE module
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.MAIA_WINDOWS_SIGNING_PFX_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.MAIA_WINDOWS_SIGNING_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PFX_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:SIGNING_PASSWORD)) {
            throw 'Stable Maia3 releases require Windows Authenticode credentials.'
          }
          $pfx = Join-Path $env:RUNNER_TEMP 'maia3-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if ($null -eq $signTool) { throw 'signtool.exe was not found.' }
          $files = Get-ChildItem "$env:RUNNER_TEMP/maia3-stage/maia3-runtime" -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.dll', '.pyd' }
          if ($files.Count -eq 0) { throw 'No Windows runtime binaries were found.' }
          foreach ($file in $files) {
            & $signTool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:SIGNING_PASSWORD $file.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            & $signTool.FullName verify /pa /all $file.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          Remove-Item -Force $pfx

      - name: Sign, notarize, and staple the macOS component
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MAIA_APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MAIA_APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.MAIA_APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.MAIA_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MAIA_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MAIA_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for variable in CERTIFICATE_P12_BASE64 CERTIFICATE_PASSWORD SIGNING_IDENTITY \
            APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            test -n "${!variable:-}" || { echo "Missing $variable." >&2; exit 1; }
          done
          certificate="$RUNNER_TEMP/maia3-signing.p12"
          keychain="$RUNNER_TEMP/maia3-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          python -c 'import base64, os, pathlib; pathlib.Path(os.environ["RUNNER_TEMP"], "maia3-signing.p12").write_bytes(base64.b64decode(os.environ["CERTIFICATE_P12_BASE64"], validate=True))'
          security create-keychain -p "$keychain_password" "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          app="$RUNNER_TEMP/maia3-stage/maia3-runtime/UCI-Grabber-Maia3.app"
          while IFS= read -r -d '' candidate; do
            if file "$candidate" | grep -q 'Mach-O'; then
              codesign --force --timestamp --options runtime --sign "$SIGNING_IDENTITY" --keychain "$keychain" "$candidate"
            fi
          done < <(find "$app/Contents/MacOS" -type f -print0)
          codesign --force --deep --timestamp --options runtime --sign "$SIGNING_IDENTITY" --keychain "$keychain" "$app"
          ditto -c -k --keepParent "$app" "$RUNNER_TEMP/maia3-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/maia3-notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          xcrun stapler validate "$app"
          rm -f "$certificate"
          security delete-keychain "$keychain"

      - name: Verify zero-argument offline UCI behavior with immutable 5M checkpoint
        shell: bash
        run: |
          set -euo pipefail
          checkpoint="$RUNNER_TEMP/maia3-5m.pt"
          curl --fail --location --retry 3 \
            --output "$checkpoint" \
            https://huggingface.co/UofTCSSLab/Maia3-5M/resolve/b6559de2398d7140b985f28fd2c19fb5e47ddabe/maia3-5m.pt
          python packaging/maia3/verify_file.py "$checkpoint" \
            --bytes 20968049 \
            --sha256 ba14208b2992d85502f5fb501934abf6aaaeb355e9f3fdf90e326911f562524f
          python packaging/maia3/smoke_runtime.py \
            --runtime-root "$RUNNER_TEMP/maia3-stage/maia3-runtime" \
            --platform '${{ matrix.platform }}' \
            --model maia3-5m \
            --checkpoint "$checkpoint"
      - name: Package the verified runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir release-assets
          python packaging/maia3/package_runtime.py \
            --stage "$RUNNER_TEMP/maia3-stage" \
            --format '${{ matrix.archive }}' \
            --output 'release-assets/${{ matrix.asset }}'
          test -s 'release-assets/${{ matrix.asset }}'
      - name: Revalidate the packaged macOS signature and notarization ticket
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          extracted="$RUNNER_TEMP/maia3-packaged-runtime"
          mkdir "$extracted"
          zstd --decompress --stdout 'release-assets/${{ matrix.asset }}' \
            | tar -xf - -C "$extracted"
          app="$extracted/maia3-runtime/UCI-Grabber-Maia3.app"
          test -d "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=2 "$app"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: component-maia3-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          overwrite: true

  catalog:
    name: Verify catalog and assemble component assets
    needs: [gate, licenses, app_build, maia_source, maia_runtime]
    if: >-
      always() &&
      needs.gate.result == 'success' &&
      needs.licenses.result == 'success' &&
      needs.app_build.result == 'success' &&
      (needs.gate.outputs.maia_enabled != 'true' ||
       (needs.maia_source.result == 'success' && needs.maia_runtime.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.tag }}
      - name: Download native application packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: package-app-*
          path: dist
          merge-multiple: true
      - name: Download reviewed Maia3 assets
        if: needs.gate.outputs.maia_enabled == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: component-maia3-*
          path: dist
          merge-multiple: true
      - name: Stage catalog verification data
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp catalog/catalog.pub dist/catalog.pub
          cp catalog/schema/recipe-v1.schema.json dist/recipe-v1.schema.json
          cp catalog/schema/catalog-v1.schema.json dist/catalog-v1.schema.json
      - name: Verify and stage the signed empty catalog
        if: needs.gate.outputs.maia_enabled != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 catalog/verify_catalog.py \
            --catalog catalog/catalog.json \
            --signature catalog/catalog.sig \
            --bootstrap
          cp catalog/catalog.json dist/catalog.json
          cp catalog/catalog.sig dist/catalog.sig
          python3 catalog/verify_catalog.py \
            --catalog dist/catalog.json \
            --signature dist/catalog.sig \
            --bootstrap
      - name: Generate deterministic reviewed Maia3 catalog
        if: needs.gate.outputs.maia_enabled == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.gate.outputs.tag }}
          REVIEW_DIGEST: ${{ needs.gate.outputs.metadata_digest }}
        run: |
          set -euo pipefail
          epoch="$(git show -s --format=%ct HEAD)"
          generated="$(date -u -d "@$epoch" +'%Y-%m-%dT%H:%M:%SZ')"
          expires="$(date -u -d "@$((epoch + 31536000))" +'%Y-%m-%dT%H:%M:%SZ')"
          arguments=(
            --assets-dir dist
            --repository "$GITHUB_REPOSITORY"
            --tag "$RELEASE_TAG"
            --generated-at "$generated"
            --expires-at "$expires"
            --output dist/catalog.json
            --include-maia3
            --maia3-license-review-digest "$REVIEW_DIGEST"
          )
          python3 catalog/generate_catalog.py "${arguments[@]}"
      - name: Sign exact reviewed Maia3 catalog bytes with the offline catalog key
        if: needs.gate.outputs.maia_enabled == 'true'
        shell: bash
        env:
          PRIVATE_KEY_BASE64: ${{ secrets.CATALOG_ED25519_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "${PRIVATE_KEY_BASE64:-}" || {
            echo 'Stable catalog publication requires CATALOG_ED25519_PRIVATE_KEY_BASE64.' >&2
            exit 1
          }
          private_key="$RUNNER_TEMP/catalog-private.pem"
          derived_public="$RUNNER_TEMP/catalog-public.pem"
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["RUNNER_TEMP"], "catalog-private.pem").write_bytes(base64.b64decode(os.environ["PRIVATE_KEY_BASE64"], validate=True))'
          chmod 600 "$private_key"
          openssl pkey -in "$private_key" -pubout -out "$derived_public"
          actual="$(openssl pkey -pubin -in "$derived_public" -outform DER | tail -c 32 | od -An -vtx1 | tr -d ' \n')"
          expected="$(tr -d ' \r\n' < catalog/catalog.pub)"
          test "$actual" = "$expected" || {
            echo 'Catalog private key does not match the public key embedded in UCI Grabber.' >&2
            exit 1
          }
          openssl pkeyutl -sign -rawin \
            -inkey "$private_key" \
            -in dist/catalog.json \
            -out dist/catalog.sig
          test "$(wc -c < dist/catalog.sig)" = 64
          python3 catalog/verify_catalog.py \
            --catalog dist/catalog.json \
            --signature dist/catalog.sig \
            --public-key "$derived_public"
          rm -f "$private_key"
      - name: Inventory the exact release payload
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' \
            | LC_ALL=C sort \
            | xargs sha256sum > SHA256SUMS
          sha256sum --check --strict SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: UCI-Grabber-catalog-and-components
          path: dist/*
          if-no-files-found: error
          overwrite: true
      - name: Publish immutable catalog and component assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            Security note: UCI Grabber v1 application archives are checksummed but are not
            Authenticode-signed or Apple-signed/notarized, so the operating system may warn
            before first launch. Optional curated Maia3 Windows/macOS runtimes are published
            only after their separate signing and notarization gates pass.
          fail_on_unmatched_files: true
          overwrite_files: false
          files: dist/*
